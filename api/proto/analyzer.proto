syntax = "proto3";

package analyzer;

option go_package = "./api/proto/analyzerpb";

// Configuration analysis service
service AnalyzerService {
  // Performs analysis of the input configuration and returns found issues
  rpc Analyze (AnalyzeRequest) returns (AnalyzeResponse);
}

// Request for configuration analysis
message AnalyzeRequest {
  // Configuration as a string (JSON/YAML)
  string config = 1;
}

// Response after configuration analysis
message AnalyzeResponse {
  // List of found issues/notes
  repeated Issue issues = 1;
  // Total number of found issues
  int32 count = 2;
}

// Issue found during analysis
message Issue {

  // Severity level
  string severity = 1;

  // Description of the issue
  string description = 2;

  // Recommendation for remediation
  string recommendation = 3;

  // Path/location in the configuration where the issue was found
  string path = 4;
}
